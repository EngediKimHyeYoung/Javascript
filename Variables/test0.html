<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 전역 스코프
        let num = 10;
        console.log(num);

        function numPrint() {
            console.log(num);
        }
        numPrint();

        function numPrint1() {
            // 지역 스코프
            let num = 20;
            console.log("함수내: "+ num);
        }
        numPrint1();
        console.log(num);
    </script>
</head>
