<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        // 로드 이벤트
        window.onload = function () {

            // 변수 선언
            var myDate;
            var year;
            var month;
            var date;
            var day;
            var hour;
            var minute;
            var second;
            var ampm;
            // 배열 생성
            var myDay = ["일", "월", "화", "수", "목", "금", "토"];

            // 사용자 정의 함수 myTime 선언
            var myTime = function () {
                myDate = new Date();
                year = myDate.getFullYear();
                month = myDate.getMonth() + 1;
                date = myDate.getDate();
                day = myDate.getDay();
                hour = myDate.getHours();
                minute = myDate.getMinutes();
                second = myDate.getSeconds();

                if (hour < 13) {
                    ampm = "AM";
                } else {
                    ampm = "PM";
                }
                if (hour > 12) {
                    hour = hour - 12;
                }
                if (minute < 10) {
                    minute = "0" + minute;
                }
                if (second < 10) {
                    second = "0" + second;
                }

                document.getElementById("text1").innerText = year + "년 " + month + "월 " + date + "일 " + myDay[day] + "요일";
                document.getElementById("text2").innerText = "[" + ampm + ". " + hour + ":" + minute + ":" + second + "]";

                document.getElementById("hour").style.transform = "rotate(" + (hour*30 + minute*0.5) + "deg)";
                document.getElementById("minute").style.transform = "rotate("+ (minute*6 + second*0.1) +"deg)";
                document.getElementById("second").style.transform = "rotate(" + (second * 6) + "deg)";

                // console.log("test1: rotate(" + (30 * 6) + "deg)");
                // console.log("test2: rotate(" + 30 * 6 + "deg)");
            }
            // 반복 함수
            setInterval(function () {
                // 함수 호출
                myTime();
            }, 1000);



            // 자바스크립트 요소 동적 생성
            var clockSet = document.createElement("div");
            clockSet.setAttribute('id', 'clock');

            var span1 = document.createElement("span");
            span1.setAttribute('id', 'hour');
            var span2 = document.createElement("span");
            span2.setAttribute('id', 'minute');
            var span3 = document.createElement("span");
            span3.setAttribute('id', 'second');

            document.getElementById("clockSection").appendChild(clockSet);
            document.getElementById("clock").appendChild(span1);
            document.getElementById("clock").appendChild(span2);
            document.getElementById("clock").appendChild(span3);

            // 함수 호출
            myTime();

        }
    </script>

    <style>
        .blind {
            display: none;
        }

        #clockSection #text2 {
            font-size: 50px;
            font-weight: bold;
            display: block;
        }

        #clock {
            width: 140px;
            height: 140px;
            background-color: rgb(249, 249, 158);
            border-radius: 50%;
            position: fixed;
            top: 50px;
            right: 50px;
            transform: rotate(180deg);
        }

        #clock #hour {
            border: 6px solid red;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 30px;
            z-index: 1;
            margin-top: -6px;
            margin-left: 6px;
            transform-origin: 0% 0%;
            /* transform: rotate(90deg); */
        }

        #clock #minute {
            border: 4px solid blue;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 50px;
            z-index: 2;
            margin-top: -4px;
            margin-left: 4px;
            transform-origin: 0% 0%;
            /* transform: rotate(90deg); */
        }

        #clock #second {
            border: 2px solid green;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 70px;
            z-index: 3;
            margin-top: -2px;
            margin-left: 2px;
            transform-origin: 0% 0%;
            /* transform: rotate(90deg); */
        }
        #text {
            width: 400px;
            height: 200px;
            background-color: orange;
            font-size: 50px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 0;
            margin-left: -200px;
            margin-top: -100px;
            position: absolute;
            top: 50%;
            left: 50%;
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>

<body>
    <h1>시간 출력 & <span>시계</span></h1>

    <p id="text">box</p>

    <section id="clockSection">
        <h2 class="blind">시간정보</h2>
        <p>
            <span id="text1"></span>
            <span id="text2"></span>
        </p>

        <!-- <div id="clock">
            <span id="hour"></span>
            <span id="minute"></span>
            <span id="second"></span>
        </div> -->
    </section>


</body>

</html>
