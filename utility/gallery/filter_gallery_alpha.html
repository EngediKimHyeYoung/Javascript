<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="../js/jquery-3.3.1.min.js"></script>
    <script src="filter_gallery_alpha.js"></script>
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
    }

    .title {
        margin-top: 20px;
        font-weight: bold;
    }

    .gallerySet {
        /* border: 1px solid red; */
        width: 1000px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
    }

    .set {
        /* border: 1px solid blue; */
        /* transform-origin: 50% 50%; */
        transition: all .8s;
        animation-name: aniIn;
        animation-duration: .8s;
        animation-fill-mode: forwards;
        cursor: pointer;
    }

    .setContainer {
        width: 95%;
        height: 94%;
        padding: 20px;
        margin: 0 auto;
        background-color: #f1f1f1;
        /* border: 1px solid green; */
    }

    @keyframes aniIn {
        from {
            opacity: 0;
            transform: scale(0);
            height: 0;
        }

        to {
            opacity: 1;
            transform: scale(1);
            height: 305px;
        }
    }

    @keyframes aniOut {
        from {
            opacity: 1;
            transform: scale(1);
            height: 305px;
        }

        to {
            opacity: 0;
            transform: scale(0);
            height: 0;
        }
    }

    .set img {
        width: 100%;
    }

    #buttonSet {
        margin-top: 50px;
        margin-bottom: 20px;
        text-align: center;
    }

    .btn {
        font-size: 1em;
        padding: 12px 16px;
        cursor: pointer;
        display: inline-block;
        border-radius: 10px;
        margin: 0 10px;
    }

    .btn:hover {
        background-color: #ddd;
    }
</style>

<body>
    <div id="buttonSet">

        <div id="nature" class="btn"> Nature</div>
        <div id="cars" class="btn"> Cars</div>
