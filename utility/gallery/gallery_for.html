<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="../js/jquery-3.3.1.min.js"></script>
    <script>
        $(function () {
            var totalNum = 15;
            var selectNum;
            var galleryArray = ["orange", "aqua", "red", "green", "aquamarine", "pink", "orange", "aqua", "red", "green", "aquamarine", "pink", "orange", "aqua", "red"]

            //$("#h_listSet").append("<div id='list0' class='h_listStyle'>0</div>")
            //$("#h_listSet").append("<div id='list1' class='h_listStyle'>1</div>")
            //$("#h_listSet").append("<div id='list2' class='h_listStyle'>2</div>")
            
            for (i = 0; i < totalNum; i++) {

                $("#h_listSet").append("<div id='list"+i+ "' class='h_listStyle'>" + i + "</div>")

                $("#list" + i).css("background", galleryArray[i]);

                $("#list" + i).on("click", function (e) {
                    selectNum = e.currentTarget.id.slice(4, 6);
                    console.log(selectNum);
                    $("#h_gallery").css("background", galleryArray[selectNum]);
                });
            }
        });
    </script>
    <style>
        #h_listGallery {
            border: 2px solid red;
            width: 800px;
            height: 600px;
            display: flex;
        }

        #h_listSet {
            border: 2px solid blue;
            flex: 1.5;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* grid-auto-rows: minmax(30px, auto); */
            grid-gap: 0.8rem;
        }

        #h_gallery {
            border: 2px solid blue;
            flex: 2;
            background: orange;
            margin-left: 15px;
        }

        .h_listStyle {
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div id="h_listGallery">
        <div id="h_listSet">
            
        </div>
        <div id="h_gallery"></div>
    </div>
</body>

</html>
